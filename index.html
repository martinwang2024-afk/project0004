<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<title>骂死丫的</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
font-size:40px;
margin-top:20px;
}

#game{
width:700px;
margin:auto;
}

.bar{
height:25px;
border-radius:10px;
margin:10px 0;
transition:width 0.5s;
}

#playerBar{
background:#4CAF50;
}

#enemyBar{
background:#ff4444;
}

.choices{
margin-top:20px;
}

button{
padding:10px 16px;
margin:6px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
}

button:hover{
background:#ddd;
color:black;
}

#log{
margin-top:20px;
height:160px;
overflow:auto;
background:#222;
padding:10px;
text-align:left;
border-radius:8px;
}

#gif{
margin-top:20px;
}

</style>

</head>

<body>

<h1>骂死丫的</h1>

<div id="game">

<h3>我 的血量</h3>
<div class="bar" id="playerBar" style="width:100%"></div>

<h3>张派比 的血量</h3>
<div class="bar" id="enemyBar" style="width:100%"></div>

<div id="gif">

<img id="gifImg" src="zhangpai.gif" height="150">

</div>

<div class="choices" id="choices"></div>

<div id="log"></div>

</div>

<script>

let playerHP = 100
let enemyHP = 100

const insults = [

"你丫哪儿冒出来的",
"你这脑子进水了吧",
"瞧你这德行",
"你丫少在这儿贫",
"你这嘴跟机关枪似的",
"你这脑回路真清奇",
"你这脸皮厚得能挡风",
"你丫怎么这么欠",
"你这话说得跟放炮似的",
"你这人跟二五八万似的",

"你这脑袋是摆设吧",
"你这脸比城墙还厚",
"你丫怎么这么能嘚瑟",
"你这话说出来不脸红吗",
"你这逻辑谁教你的",
"你这嘴一张准没好话",
"你丫可真能装",
"你这人真够可以的",
"你这脑子是不是落家里了",
"你这话说出来不嫌丢人",

"你丫是不是没睡醒",
"你这脑子跟浆糊似的",
"你这人一天不嘚瑟难受",
"你这嘴一天能惹多少事",
"你这人一看就不靠谱",
"你这脸皮能拿去铺路",
"你这水平也敢出来吆喝",
"你这逻辑真是绝了",
"你丫是不是喝多了",
"你这人跟喜剧似的",

"你这人一天不现眼难受",
"你这话跟胡同风似的乱吹",
"你这脑子跟摆设差不多",
"你这嘴比喇叭还响",
"你这德行也敢嚷嚷",
"你这脑回路比地铁还绕",
"你这话说得像段子",
"你丫真会给自己加戏",
"你这脸皮厚得能防弹",
"你这话一听就不靠谱",

"你这脑子短路了吧",
"你这嘴停不下来是吧",
"你丫一天不找骂难受",
"你这逻辑真清奇",
"你这话说得跟梦话似的",
"你这人跟段子似的",
"你这脑子摆设一样",
"你这嘴是借来的吧",
"你这人一开口就露怯",
"你丫是真敢说"

]

function randomInsult(){

let phrase = insults[Math.floor(Math.random()*insults.length)]

let score = [10,5,2][Math.floor(Math.random()*3)]

return {phrase,score}

}

function newTurn(){

let div = document.getElementById("choices")

div.innerHTML=""

for(let i=0;i<3;i++){

let choice = randomInsult()

let btn = document.createElement("button")

btn.innerText = choice.phrase

btn.onclick = ()=>attack(choice)

div.appendChild(btn)

}

}

function attack(playerChoice){

let enemyChoice = randomInsult()

let diff = playerChoice.score - enemyChoice.score

if(diff>0){

enemyHP -= diff*3

}else{

playerHP -= Math.abs(diff)*3

}

updateBars()

logText(
"我骂："+playerChoice.phrase+
"<br>张派比回击："+enemyChoice.phrase+
"<br>分差："+diff
)

checkEnd()

newTurn()

}

function updateBars(){

playerHP = Math.max(playerHP,0)
enemyHP = Math.max(enemyHP,0)

document.getElementById("playerBar").style.width = playerHP+"%"
document.getElementById("enemyBar").style.width = enemyHP+"%"

}

function logText(t){

let log = document.getElementById("log")

log.innerHTML = t + "<hr>" + log.innerHTML

}

function checkEnd(){

if(playerHP<=0){

alert("我被骂趴下了")

location.reload()

}

if(enemyHP<=0){

alert("张派比被骂死丫的！")

location.reload()

}

}

newTurn()

</script>

</body>

</html>
